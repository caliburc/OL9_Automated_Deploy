- name: Join the host to IPA/IdM non-interactively
  ansible.builtin.command:
    cmd: >
      ipa-client-install
      --unattended
      --mkhomedir
      --enable-dns-updates
      --hostname={{ ansible_facts['nodename'] }}
      --domain={{ ipa_domain }}
      --realm={{ ipa_realm }}
      {% for server in ipa_servers %}--server={{ server }} {% endfor %}
      {% for server in ipa_servers %}--ntp-server={{ server }} {% endfor %}
      --automount-location={{ build_vm.ipa_automount_location | default('hedc') }}
      --principal={{ ipa_principal_user }}
      --password={{ ipa_principal_pass }}
    creates: "{{ ipa_client_state_file }}"
  no_log: true
  register: ipa_join_result
  tags: ipa

- name: Verify IdM client config file exists
  ansible.builtin.stat:
    path: "{{ ipa_client_state_file }}"
  register: ipa_default_conf
  tags: ipa

- name: Fail if join did not complete
  ansible.builtin.fail:
    msg: "IPA client enrollment did not complete successfully"
  when: not ipa_default_conf.stat.exists
  tags: ipa

- name: Update permissions of ansible /app/ansible dir
  ansible.builtin.file:
    path: /app/ansible
    state: directory
    owner: hedcadm
    group: allusers
    mode: 0775
  tags: host_config