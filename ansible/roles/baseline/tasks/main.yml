---
- name: Waiting for cloud-init boot-finished file to exist
  ansible.builtin.stat: 
    path: /var/lib/cloud/instance/boot-finished
    follow: true
  become: true
  register: cloud_init_done
  until: cloud_init_done.stat.exists
  retries: 30
  delay: 20
  tags: 
    - host_config
    - cloudinit

- name: Create Birth Certificate 
  ansible.builtin.template:
    src: birth_certificate.j2
    dest: /etc/birth_certificate
    owner: root
    group: root
    mode: '0700'
    force: false
  tags: host_config

- name: Place Repo Files
  ansible.builtin.copy:
    src: etc/yum.repos.d/{{ repo_file }}
    dest: /etc/yum.repos.d/{{ repo_file }}
    owner: root
    group: root
    mode: '0600'
    force: true
  loop:
    - hedc-oracle.repo
    - hedc-custom.repo
  loop_control:
    loop_var: repo_file
  tags: host_config

- name: Ensure required IPA packages are installed
  ansible.builtin.dnf:
    name:
      - ipa-client
      - chrony
    state: present
  register: ipa_pkg_result
  tags: ipa

- name: Ensure chronyd is enabled and running
  ansible.builtin.service:
    name: chronyd
    state: started
    enabled: true
  tags: ipa

- name: Verify IPA servers resolve
  ansible.builtin.command: "getent hosts {{ ipa_server }}"
  loop: "{{ ipa_servers }}"
  loop_control:
    loop_var: ipa_server
  changed_when: false
  tags: ipa

