---
# =============================================================================
# STIG Sub-tasks: Privilege and Grant Controls (Non-CDB)
# VULs: O19C-00-001300, 001400, 000800, 002000, 010300, 010500,
#        010900, 011000, 011400, 017800
# Uses loop_var: stig_db  (set in main.yml)
# SQL logic lives in templates/sql/stig_privileges.sql.j2
# =============================================================================

- name: "[STIG privs – {{ stig_db.sid }}] Deploy privileges SQL script"
  ansible.builtin.template:
    src: sql/stig_privileges.sql.j2
    dest: "/tmp/stig_privileges_{{ stig_db.sid }}.sql"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_dba_group }}"
    mode: "0640"
  when: not oracle_stig_report_only | bool
  tags: stig_privs

- name: "[STIG privs – {{ stig_db.sid }}] Execute privileges SQL script"
  ansible.builtin.shell: |
    {{ oracle_home }}/bin/sqlplus -s / as sysdba @/tmp/stig_privileges_{{ stig_db.sid }}.sql
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_BASE: "{{ oracle_base }}"
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_SID:  "{{ stig_db.sid }}"
    PATH: "{{ oracle_home }}/bin:{{ ansible_env.PATH }}"
    LD_LIBRARY_PATH: "{{ oracle_home }}/lib"
  register: stig_privs_result
  changed_when: stig_privs_result.rc == 0
  failed_when: false
  when: not oracle_stig_report_only | bool
  tags: stig_privs

- name: "[STIG privs – {{ stig_db.sid }}] Display output"
  ansible.builtin.debug:
    var: stig_privs_result.stdout_lines
  when: not oracle_stig_report_only | bool
  tags: stig_privs

- name: "[STIG privs – {{ stig_db.sid }}] Remove privileges SQL script"
  ansible.builtin.file:
    path: "/tmp/stig_privileges_{{ stig_db.sid }}.sql"
    state: absent
  when: not oracle_stig_report_only | bool
  tags: stig_privs