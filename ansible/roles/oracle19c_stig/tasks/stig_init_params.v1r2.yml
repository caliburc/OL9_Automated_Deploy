---
# =============================================================================
# STIG Sub-tasks: Database Initialization Parameter Controls (Non-CDB)
# Uses loop_var: stig_db  (set in main.yml)
# SQL logic lives in templates/sql/stig_init_params.sql.j2
# =============================================================================

- name: "[STIG params – {{ stig_db.sid }}] Deploy init parameter SQL script"
  ansible.builtin.template:
    src: sql/stig_init_params.sql.j2
    dest: "/tmp/stig_init_params_{{ stig_db.sid }}.sql"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_dba_group }}"
    mode: "0640"
  when: not oracle_stig_report_only | bool
  tags: stig_params

- name: "[STIG params – {{ stig_db.sid }}] Execute init parameter SQL script"
  ansible.builtin.shell: |
    {{ oracle_home }}/bin/sqlplus -s / as sysdba @/tmp/stig_init_params_{{ stig_db.sid }}.sql
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_BASE: "{{ oracle_base }}"
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_SID:  "{{ stig_db.sid }}"
    PATH: "{{ oracle_home }}/bin:{{ ansible_env.PATH }}"
    LD_LIBRARY_PATH: "{{ oracle_home }}/lib"
  register: stig_params_result
  changed_when: stig_params_result.rc == 0
  failed_when: false
  when: not oracle_stig_report_only | bool
  tags: stig_params

- name: "[STIG params – {{ stig_db.sid }}] Display output"
  ansible.builtin.debug:
    var: stig_params_result.stdout_lines
  when: not oracle_stig_report_only | bool
  tags: stig_params

- name: "[STIG params – {{ stig_db.sid }}] Remove init parameter SQL script"
  ansible.builtin.file:
    path: "/tmp/stig_init_params_{{ stig_db.sid }}.sql"
    state: absent
  when: not oracle_stig_report_only | bool
  tags: stig_params

- name: "[STIG params – {{ stig_db.sid }}] Note – restart required for SPFILE params"
  ansible.builtin.debug:
    msg: >
      The following parameters were set with SCOPE=SPFILE and require a DB restart
      to take effect: REMOTE_OS_AUTHENT, REMOTE_OS_ROLES, AUDIT_TRAIL,
      AUDIT_SYS_OPERATIONS, SQL92_SECURITY, SEC_MAX_FAILED_LOGIN_ATTEMPTS,
      SEC_RETURN_SERVER_RELEASE_BANNER. Plan a maintenance window.
  tags: stig_params