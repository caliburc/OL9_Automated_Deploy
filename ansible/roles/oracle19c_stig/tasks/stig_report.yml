---
# =============================================================================
# STIG Sub-tasks: Compliance Report Generation (Non-CDB)
# Uses loop_var: stig_db  (set in main.yml)
# SQL logic lives in templates/sql/stig_report.sql.j2
# =============================================================================

- name: "[STIG report – {{ stig_db.sid }}] Deploy compliance report SQL script"
  ansible.builtin.template:
    src: sql/stig_report.sql.j2
    dest: "/tmp/stig_report_{{ stig_db.sid }}.sql"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_dba_group }}"
    mode: "0640"
  tags: stig_report

- name: "[STIG report – {{ stig_db.sid }}] Execute compliance report SQL script"
  ansible.builtin.shell: |
    {{ oracle_home }}/bin/sqlplus -s / as sysdba @/tmp/stig_report_{{ stig_db.sid }}.sql
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_BASE: "{{ oracle_base }}"
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_SID:  "{{ stig_db.sid }}"
    PATH: "{{ oracle_home }}/bin:{{ ansible_env.PATH }}"
    LD_LIBRARY_PATH: "{{ oracle_home }}/lib"
  register: stig_report_result
  changed_when: false
  failed_when: false
  tags: stig_report

- name: "[STIG report – {{ stig_db.sid }}] Display report output"
  ansible.builtin.debug:
    var: stig_report_result.stdout_lines
  tags: stig_report

- name: "[STIG report – {{ stig_db.sid }}] Write compliance report to file"
  ansible.builtin.copy:
    content: "{{ stig_report_result.stdout }}"
    dest: "{{ oracle_stig_report_dir }}/stig_compliance_{{ stig_db.sid }}_{{ ansible_date_time.date }}.txt"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_dba_group }}"
    mode: "0640"
  tags: stig_report

- name: "[STIG report – {{ stig_db.sid }}] Remove compliance report SQL script"
  ansible.builtin.file:
    path: "/tmp/stig_report_{{ stig_db.sid }}.sql"
    state: absent
  tags: stig_report

- name: "[STIG report – {{ stig_db.sid }}] Report location"
  ansible.builtin.debug:
    msg: "STIG report saved: {{ oracle_stig_report_dir }}/stig_compliance_{{ stig_db.sid }}_{{ ansible_date_time.date }}.txt"
  tags: stig_report