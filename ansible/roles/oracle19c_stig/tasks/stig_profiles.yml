---
# =============================================================================
# STIG Sub-tasks: Profile and Password Policy Controls (Non-CDB)
# VULs: O19C-00-001100 through O19C-00-001700, O19C-00-001800, O19C-00-002800
# Uses loop_var: stig_db  (set in main.yml)
# SQL logic lives in templates/sql/stig_profiles.sql.j2
# =============================================================================

- name: "[STIG profiles – {{ stig_db.sid }}] Deploy profiles SQL script"
  ansible.builtin.template:
    src: sql/stig_profiles.sql.j2
    dest: "/tmp/stig_profiles_{{ stig_db.sid }}.sql"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_dba_group }}"
    mode: "0640"
  when: not oracle_stig_report_only | bool
  tags: stig_profiles

- name: "[STIG profiles – {{ stig_db.sid }}] Execute profiles SQL script"
  ansible.builtin.shell: |
    {{ oracle_home }}/bin/sqlplus -s / as sysdba @/tmp/stig_profiles_{{ stig_db.sid }}.sql
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_BASE: "{{ oracle_base }}"
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_SID:  "{{ stig_db.sid }}"
    PATH: "{{ oracle_home }}/bin:{{ ansible_env.PATH }}"
    LD_LIBRARY_PATH: "{{ oracle_home }}/lib"
  register: stig_profiles_result
  changed_when: stig_profiles_result.rc == 0
  failed_when: false
  when: not oracle_stig_report_only | bool
  tags: stig_profiles

- name: "[STIG profiles – {{ stig_db.sid }}] Display output"
  ansible.builtin.debug:
    var: stig_profiles_result.stdout_lines
  when: not oracle_stig_report_only | bool
  tags: stig_profiles

- name: "[STIG profiles – {{ stig_db.sid }}] Remove profiles SQL script"
  ansible.builtin.file:
    path: "/tmp/stig_profiles_{{ stig_db.sid }}.sql"
    state: absent
  when: not oracle_stig_report_only | bool
  tags: stig_profiles