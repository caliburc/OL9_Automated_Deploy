---
# =============================================================================
# Role: oracle_post_config
# Purpose: Post-build configuration – listener, oratab, tnsnames, systemd,
#          and per-DB post-SQL for all customer databases.
# Non-CDB: no PDB references anywhere in this role.
# =============================================================================

# ── 1. /etc/oratab – customer DBs set to Y (auto-start) ─────────────────────
- name: "Ensure oratab entry for {{ item.sid }} (auto-start = Y)"
  ansible.builtin.lineinfile:
    path: /etc/oratab
    regexp: "^{{ item.sid }}:"
    line: "{{ item.sid }}:{{ oracle_home }}:Y"
    state: present
    create: true
    owner: "{{ oracle_user }}"
    group: "{{ oracle_dba_group }}"
    mode: "0664"
  loop: "{{ oracle_databases }}"
  loop_control:
    label: "{{ item.sid }}"
  tags: oratab

