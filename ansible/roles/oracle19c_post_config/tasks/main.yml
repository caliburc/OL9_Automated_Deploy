# ── 6. systemd service per customer DB ──────────────────────────────────────
- name: "Deploy systemd service for {{ item.sid }}"
  ansible.builtin.template:
    src: oracle-db.service.j2
    dest: "/etc/systemd/system/oracle-db-{{ item.sid }}.service"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ oracle_databases }}"
  loop_control:
    label: "{{ item.sid }}"
  tags: systemd

- name: "Deploy start/stop control script for {{ item.sid }}"
  ansible.builtin.template:
    src: oracle_db_ctl.sh.j2
    dest: "/usr/local/bin/oracle_db_ctl_{{ item.sid }}.sh"
    owner: root
    group: root
    mode: "0755"
  loop: "{{ oracle_databases }}"
  loop_control:
    label: "{{ item.sid }}"
  tags: systemd

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  tags: systemd

- name: "Enable and start systemd service for {{ item.sid }}"
  ansible.builtin.systemd:
    name: "oracle-db-{{ item.sid }}"
    enabled: true
    state: started
  loop: "{{ oracle_databases }}"
  loop_control:
    label: "{{ item.sid }}"
  tags: systemd

# ── 7. Final status report per customer DB ───────────────────────────────────
- name: "Final status check – {{ item.sid }}"
  ansible.builtin.shell: |
    echo "=== Instance: {{ item.sid }} ==="
    {{ oracle_home }}/bin/sqlplus -s / as sysdba <<'EOF'
    set lines 140 pages 30
    col instance_name for a12
    col host_name     for a30
    col version       for a15
    select instance_name, host_name, version, status, database_status
    from v$instance;
    select name, db_unique_name, open_mode, log_mode, created
    from v$database;
    exit
    EOF
    echo "=== Listener ==="
    {{ oracle_home }}/bin/lsnrctl status LMT
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_BASE: "{{ oracle_base }}"
    ORACLE_HOME: "{{ oracle_home }}"
    TNS_ADMIN: "{{ oracle_base }}/common/tns"
    ORACLE_SID: "{{ item.sid }}"
    PATH: "{{ oracle_home }}/bin:{{ ansible_env.PATH }}"
    LD_LIBRARY_PATH: "{{ oracle_home }}/lib"
  register: final_status
  changed_when: false
  loop: "{{ oracle_databases }}"
  loop_control:
    label: "{{ item.sid }}"
  tags: final_status

- name: Print final status
  ansible.builtin.debug:
    var: final_status.results | map(attribute='stdout_lines') | list
  tags: final_status
