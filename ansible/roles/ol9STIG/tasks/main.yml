# R-271634 OL09-00-001110
- name: Enable hardened authselect profile and apply
  ansible.builtin.shell: >
    authselect select custom/hardening &&
    authselect enable-feature with-sudo &&
    authselect enable-feature with-mkhomedir &&
    authselect enable-feature with-faillock &&
    authselect enable-feature with-silent-lastlog &&
    authselect enable-feature with-smartcard &&
    authselect enable-feature without-nullok &&
    authselect apply-changes
  register: authselect_result
  changed_when: authselect_result.rc == 0
  failed_when: authselect_result.rc != 0
  ignore_errors: true

