- name: Create fapolicyd rules for Oracle
  ansible.builtin.copy:
    dest: /etc/fapolicyd/rules.d/01-oracle.rules
    owner: root
    group: root
    mode: '0644'
    content: |
      # Allow everything under ORACLE_HOME for oracle user and root
      allow perm=any uid=oracle : dir=/app/oracle/db19
      allow perm=any uid=0      : dir=/app/oracle/db19
      allow perm=execute all    : dir=/usr/local/bin
  notify: reload fapolicyd

- name: Set fapolicyd to permissive mode
  ansible.builtin.lineinfile:
    path: /etc/fapolicyd/fapolicyd.conf
    regexp: '^permissive\s*='
    line: 'permissive = 1'
    backup: yes
  notify: restart fapolicyd




