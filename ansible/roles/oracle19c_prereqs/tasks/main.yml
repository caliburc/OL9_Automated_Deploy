---
# =============================================================================
# Role: oracle_prereqs
# Purpose: OS-level prerequisites for Oracle 19c on OEL9
# =============================================================================

# ── 1. Required OS Packages ───────────────────────────────────────────────────
- name: Install Oracle 19c prerequisite packages
  ansible.builtin.dnf:
    name:
      # Core build / compat libs
      - bc
      - binutils
      - compat-openssl11
      - elfutils-libelf
      - elfutils-libelf-devel
      - fontconfig-devel
      - glibc
      - glibc-devel
      - ksh
      - libaio
      - libaio-devel
      - libgcc
      - libnsl
      - libstdc++
      - libstdc++-devel
      - libxcb
      - libXi
      - libXrender
      - libXrender-devel
      - libXtst
      - make
      - net-tools
      - nfs-utils
      - policycoreutils
      - policycoreutils-python-utils
      - smartmontools
      - sysstat
      - targetcli
      - unzip
      - xorg-x11-utils
      - xorg-x11-xauth
    state: present
  tags: packages

# ── 2. Oracle-specific preinstall RPM (saves manual kernel/limit tuning) ─────
- name: Install oracle-database-preinstall-19c RPM (Oracle Linux repo)
  ansible.builtin.dnf:
    name: oracle-database-preinstall-19c
    state: present
    enablerepo: ol9_baseos_latest,ol9_appstream
  ignore_errors: true          # may not exist on non-OL repos; manual tuning follows
  register: preinstall_rpm
  tags: packages

